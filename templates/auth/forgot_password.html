<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | SISTec No Dues</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-screen">
    <section class="auth-info">
        <div class="auth-brand">
            <div class="brand-logo">ND</div>
            <div>
                SISTec No Dues
                <div>Password recovery</div>
            </div>
        </div>
        <div class="auth-copy">
            <h1>Reset your student password.</h1>
            <p>Use your enrollment number and set a new password for portal access.</p>
        </div>
        <div></div>
    </section>

    <main class="auth-form-wrap">
        <section class="auth-panel">
            <h2>Forgot password</h2>
            <p>Enter your enrollment number and a new password.</p>

            <form method="POST">
                <div class="form-group">
                    <label for="enrollment">Enrollment number</label>
                    <input id="enrollment" type="text" name="enrollment" placeholder="Enrollment no." required>
                </div>

                <div class="form-group">
                    <label for="new_password">New password</label>
                    <input id="new_password" type="password" name="new_password" placeholder="New password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Reset Password</button>
                    <a href="/" class="btn-secondary">Back to Login</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
