<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | SISTec No Dues</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

    <aside class="sidebar">
        <h2>Maxdue-Hub<span>Student portal</span></h2>
        <a href="/profile">My Profile</a>
        <a href="/subjects">Subjects</a>
        <a href="/logout" class="logout">Logout</a>
    </aside>

    <main class="main">
        <div class="page-header">
            <div>
                <h1>Change Password</h1>
                <p>Update your student account password.</p>
            </div>
        </div>

        <section class="form-card">
            <form method="POST">
                <div class="form-group">
                    <label for="old_password">Current password</label>
                    <input id="old_password" type="password" name="old_password" placeholder="Current password" required>
                </div>

                <div class="form-group">
                    <label for="new_password">New password</label>
                    <input id="new_password" type="password" name="new_password" placeholder="New password" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Update Password</button>
                    <a href="/dashboard" class="btn-secondary">Back</a>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
