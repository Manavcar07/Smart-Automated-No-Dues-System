<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Assignment | SISTec No Dues</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

    <button class="student-menu-toggle" onclick="toggleSidebar()">
        ☰
    </button>

    <div class="student-overlay" onclick="toggleSidebar()"></div>

    <aside class="student-sidebar">

        <div class="student-sidebar-top">

            <div>
                <h2>Maxdue-Hub</h2>
                <p>Faculty Portal</p>
            </div>

            <button class="student-sidebar-close"
                    onclick="toggleSidebar()">
                ✕
            </button>

        </div>

        <nav class="student-sidebar-nav">

            <a href="/faculty_dashboard">
                Dashboard
            </a>

            <a href="/faculty_profile">
                Profile
            </a>

            <a href="/faculty/attendance">
                Attendance
            </a>

        </nav>

        <div class="student-sidebar-logout">
            <a href="/logout">
                Logout
            </a>
        </div>

    </aside>

    <main class="student-main">

        <div class="page-header">
            <div>
                <h1>Create Assignment</h1>
                <p>Upload an assignment PDF for the selected unit.</p>
            </div>
        </div>

        <section class="form-card">

            <form method="POST" enctype="multipart/form-data">

                <div class="form-group">
                    <label for="title">
                        Assignment Title
                    </label>

                    <input
                        id="title"
                        type="text"
                        name="title"
                        placeholder="Enter assignment title"
                        required>
                </div>

                <div class="form-group">

                    <label for="file">
                        Assignment PDF
                    </label>

                    <input
                        id="file"
                        type="file"
                        name="file"
                        required>

                </div>

                <div class="form-actions">

                    <button type="submit"
                            class="btn-primary">
                        Upload Assignment
                    </button>

                    <a href="/faculty_dashboard"
                       class="btn-secondary">
                        Back
                    </a>

                </div>

            </form>

        </section>

    </main>

    <script>
        function toggleSidebar() {
            document.body.classList.toggle(
                "student-sidebar-open"
            );
        }
    </script>

</body>
</html>
